<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>入金管理帳</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap');

:root {
  --ink: #1a1410;
  --paper: #faf7f2;
  --paper2: #f0e9dc;
  --white: #ffffff;
  --accent: #8b1a1a;
  --accent2: #c47a1e;
  --rule: #ddd3bb;
  --muted: #7a6e5f;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  -webkit-text-size-adjust: 100%;
}

/* ── HEADER ── */
header {
  background: var(--ink);
  color: var(--paper);
  padding: calc(14px + var(--safe-top)) 20px 14px;
  border-bottom: 3px solid var(--accent);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
header h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  letter-spacing: 0.12em;
}
header .sub { font-size: 10px; color: #a89880; letter-spacing: 0.18em; margin-top: 2px; }

/* ── MONTH NAV ── */
.month-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.month-nav button {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: #fff;
  width: 34px; height: 34px;
  font-size: 15px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.month-nav button:active { background: rgba(255,255,255,0.25); }
.month-label {
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  letter-spacing: 0.08em;
  min-width: 96px;
  text-align: center;
}

/* ── MAIN ── */
main {
  padding: 16px 16px calc(16px + var(--safe-bot));
  max-width: 640px;
  margin: 0 auto;
}

/* ── INPUT CARD ── */
.card {
  background: var(--white);
  border-radius: 12px;
  border: 1px solid var(--rule);
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.card-head {
  background: var(--accent);
  color: white;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.16em;
  font-weight: 500;
}
.card-body { padding: 16px; }

/* ── FIELDS ── */
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 5px;
}
.field input {
  width: 100%;
  border: 1.5px solid var(--rule);
  background: var(--paper);
  padding: 11px 13px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  color: var(--ink);
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
.field input:focus {
  border-color: var(--accent2);
  background: #fffdf8;
}
.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* ── ADD BUTTON ── */
.btn-add {
  width: 100%;
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px;
  letter-spacing: 0.1em;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 14px;
  font-weight: 500;
  transition: background 0.2s, transform 0.1s;
}
.btn-add:active { background: #6b1010; transform: scale(0.98); }

/* ── SUMMARY ── */
.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.stat {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.stat .s-label {
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 5px;
}
.stat .s-value {
  font-family: 'Noto Serif JP', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  word-break: break-all;
}
.stat .s-value.hi { color: var(--accent); }

/* ── SECTION HEADER ── */
.sec-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}
.sec-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 13px;
  letter-spacing: 0.14em;
  color: var(--muted);
}
.btn-print {
  background: var(--white);
  border: 1.5px solid var(--rule);
  color: var(--ink);
  padding: 8px 14px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  flex-shrink: 0;
  transition: background 0.2s;
}
.btn-print:active { background: var(--paper2); }

/* ── RECORD LIST ── */
.rec-list { display: flex; flex-direction: column; gap: 8px; }
.rec-item {
  background: var(--white);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--accent2);
  border-radius: 10px;
  padding: 13px 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.rec-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}
.rec-dest { font-weight: 500; font-size: 15px; flex: 1; line-height: 1.35; }
.rec-amount {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
}
.rec-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.rec-date { font-size: 12px; color: var(--muted); }
.rec-tag {
  font-size: 11px;
  background: var(--paper2);
  color: var(--muted);
  padding: 2px 8px;
  border-radius: 4px;
}
.rec-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.btn-del {
  background: none;
  border: 1px solid #e0d8cc;
  color: #bbb;
  padding: 4px 10px;
  font-size: 12px;
  border-radius: 6px;
  cursor: pointer;
}
.btn-del:active { border-color: var(--accent); color: var(--accent); background: #fff5f5; }

/* ── TOTAL ROW ── */
.total-row {
  background: var(--paper2);
  border: 1px solid var(--rule);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  font-weight: 500;
}
.total-row .t-label { font-size: 13px; letter-spacing: 0.1em; color: var(--muted); }
.total-row .t-val {
  font-family: 'Noto Serif JP', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--accent);
}

/* ── EMPTY ── */
.empty {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 0.1em;
}

/* ── PRINT ── */
@media print {
  header { background: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; position: static; }
  .card, .summary, .btn-print, .btn-del, .btn-add, .card-head { }
  .card { display: none !important; }
  .btn-print { display: none !important; }
  .btn-del { display: none !important; }
  body { background: white; font-size: 12px; }
  .rec-item { border-radius: 0; border: none; border-bottom: 1px solid #ccc; box-shadow: none; page-break-inside: avoid; }
  @page { margin: 15mm; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>入金管理帳</h1>
      <div class="sub">DAILY INCOME RECORD</div>
    </div>
    <div class="month-nav">
      <button id="prevMonth" aria-label="前月">◀</button>
      <div class="month-label" id="monthDisplay"></div>
      <button id="nextMonth" aria-label="翌月">▶</button>
    </div>
  </div>
</header>

<main>

  <!-- INPUT -->
  <div class="card">
    <div class="card-head">▸ 新規入力</div>
    <div class="card-body">
      <div class="field-row">
        <div class="field">
          <label>日付</label>
          <input type="date" id="inDate">
        </div>
        <div class="field">
          <label>金額（円）</label>
          <input type="number" id="inAmount" placeholder="0" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label>入金先（口座・振込先）</label>
        <input type="text" id="inDest" placeholder="例：○○銀行 普通 1234567" list="destList" autocomplete="off">
        <datalist id="destList"></datalist>
      </div>
      <div class="field">
        <label>内容・摘要</label>
        <input type="text" id="inDesc" placeholder="例：売上代金、サービス料" list="descList" autocomplete="off">
        <datalist id="descList"></datalist>
      </div>
      <div class="field">
        <label>店舗・部門</label>
        <input type="text" id="inStore" placeholder="例：新宿店" list="storeList" autocomplete="off">
        <datalist id="storeList"></datalist>
      </div>
      <button class="btn-add" id="btnAdd">＋ 追加する</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="stat">
      <div class="s-label">件数</div>
      <div class="s-value" id="statCount">0件</div>
    </div>
    <div class="stat">
      <div class="s-label">合計</div>
      <div class="s-value hi" id="statTotal">¥0</div>
    </div>
    <div class="stat">
      <div class="s-label">平均</div>
      <div class="s-value" id="statAvg">¥0</div>
    </div>
  </div>

  <!-- LIST -->
  <div class="sec-head">
    <div class="sec-title" id="tableTitle">入金一覧</div>
    <button class="btn-print" id="btnPrint">🖨 印刷</button>
  </div>
  <div id="listWrap"></div>

</main>

<script>
  const KEY = 'income_records_v2';
  let records = JSON.parse(localStorage.getItem(KEY) || '[]');
  const now = new Date();
  let cy = now.getFullYear(), cm = now.getMonth() + 1;

  function save() { localStorage.setItem(KEY, JSON.stringify(records)); }

  // ── Month nav
  function setMonth(y, m) {
    cy = y; cm = m;
    document.getElementById('monthDisplay').textContent = cy + '年' + cm + '月';
    document.getElementById('tableTitle').textContent = cy + '年' + cm + '月　入金一覧';
    render();
  }
  document.getElementById('prevMonth').addEventListener('click', function() {
    var m = cm - 1, y = cy;
    if (m < 1) { m = 12; y--; }
    setMonth(y, m);
  });
  document.getElementById('nextMonth').addEventListener('click', function() {
    var m = cm + 1, y = cy;
    if (m > 12) { m = 1; y++; }
    setMonth(y, m);
  });

  // ── Print
  document.getElementById('btnPrint').addEventListener('click', function() {
    window.print();
  });

  // ── Date default
  (function() {
    var d = new Date();
    var s = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    document.getElementById('inDate').value = s;
  })();

  // ── Autocomplete
  function refreshAC() {
    var dests = [...new Set(records.map(function(r){return r.dest;}).filter(Boolean))];
    var descs = [...new Set(records.map(function(r){return r.desc;}).filter(Boolean))];
    var stores = [...new Set(records.map(function(r){return r.store;}).filter(Boolean))];
    document.getElementById('destList').innerHTML = dests.map(function(v){return '<option value="'+v+'">';}).join('');
    document.getElementById('descList').innerHTML = descs.map(function(v){return '<option value="'+v+'">';}).join('');
    document.getElementById('storeList').innerHTML = stores.map(function(v){return '<option value="'+v+'">';}).join('');
  }

  // ── Add
  document.getElementById('btnAdd').addEventListener('click', function() {
    var date = document.getElementById('inDate').value;
    var dest = document.getElementById('inDest').value.trim();
    var desc = document.getElementById('inDesc').value.trim();
    var amount = parseInt(document.getElementById('inAmount').value, 10);
    var store = document.getElementById('inStore').value.trim();
    if (!date) { alert('日付を入力してください'); return; }
    if (!dest) { alert('入金先を入力してください'); return; }
    if (!amount || amount <= 0) { alert('金額を入力してください'); return; }
    records.push({ id: Date.now(), date: date, dest: dest, desc: desc, amount: amount, store: store });
    records.sort(function(a,b){ return a.date.localeCompare(b.date); });
    save(); refreshAC();
    document.getElementById('inDest').value = '';
    document.getElementById('inDesc').value = '';
    document.getElementById('inAmount').value = '';
    render();
    document.getElementById('inDest').focus();
  });

  // ── Delete
  window.deleteRecord = function(id) {
    if (!confirm('このレコードを削除しますか？')) return;
    records = records.filter(function(r){ return r.id !== id; });
    save(); render();
  };

  // ── Format
  function fmt(n) { return '¥' + Number(n).toLocaleString('ja-JP'); }
  function fmtD(s) {
    if (!s) return '';
    var p = s.split('-');
    return p[1] + '/' + p[2];
  }

  // ── Render
  function render() {
    var filtered = records.filter(function(r) {
      var p = r.date.split('-').map(Number);
      return p[0] === cy && p[1] === cm;
    });
    var total = filtered.reduce(function(s,r){ return s + r.amount; }, 0);
    var avg = filtered.length ? Math.round(total / filtered.length) : 0;
    document.getElementById('statCount').textContent = filtered.length + '件';
    document.getElementById('statTotal').textContent = fmt(total);
    document.getElementById('statAvg').textContent = fmt(avg);

    var wrap = document.getElementById('listWrap');
    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="empty">この月のデータはありません</div>';
      return;
    }

    var html = '<div class="rec-list">';
    filtered.forEach(function(r) {
      html += '<div class="rec-item">'
        + '<div class="rec-top">'
        +   '<div class="rec-dest">' + esc(r.dest) + '</div>'
        +   '<div class="rec-amount">' + fmt(r.amount) + '</div>'
        + '</div>'
        + '<div class="rec-meta">'
        +   '<span class="rec-date">' + fmtD(r.date) + '</span>'
        +   (r.desc ? '<span class="rec-tag">' + esc(r.desc) + '</span>' : '')
        +   (r.store ? '<span class="rec-tag">' + esc(r.store) + '</span>' : '')
        + '</div>'
        + '<div class="rec-bottom">'
        +   '<span></span>'
        +   '<button class="btn-del" onclick="deleteRecord(' + r.id + ')">削除</button>'
        + '</div>'
        + '</div>';
    });
    html += '</div>';
    html += '<div class="total-row"><span class="t-label">月間合計</span><span class="t-val">' + fmt(total) + '</span></div>';
    wrap.innerHTML = html;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  setMonth(cy, cm);
  refreshAC();
</script>
</body>
</html>
